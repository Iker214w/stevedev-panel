name: Actualizar estadísticas
on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"   # cada ~10 min (UTC; GitHub puede añadir unos minutos de retraso)
  workflow_dispatch:
  push:
    branches: [main]
    paths: [update-stats.py]
permissions:
  contents: write
concurrency:
  group: stats
  cancel-in-progress: true
jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -q yt-dlp
      - run: python3 update-stats.py
      - name: Commit si hay cambios
        run: |
          git config user.name "stevedev-bot"
          git config user.email "actions@github.com"
          git add stats.json
          git diff --cached --quiet || { git commit -m "stats: actualización automática"; git push; }
